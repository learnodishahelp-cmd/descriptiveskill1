<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">

    <title>ଓଡ଼ିଆ ବର୍ଣ୍ଣନା ଲେଖା - ସ୍ୱର ଅଭ୍ୟାସ | Class 5-8</title>
    <style>
        * {

            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {

        }

        /* Odia font support */

        .odia-text, button, .topic-title, .keyword-label, .model-line {
            font-family: 'Noto Sans Oriya', 'Kalinga', 'Segoe UI', sans-serif;
        }

        .app-container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255,255,255,0.85);

        .header {

        }

        .header h1 {

        select:focus {

        }

        .keywords-grid {

            flex-wrap: wrap;
            align-items: center;

            gap: 0.7rem;

        }

        .btn-stop {

            color: #15803d;
        }
        .btn-play:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

            height: 12px;
            border-radius: 20px;

        }
        .status-dot.recorded {
            background: #22c55e;
            box-shadow: 0 0 0 2px #bbf7d0;
        }

        }

        .btn-show {

            box-shadow: 0 2px 0 #c2410c;

        .model-lines {

            border-radius: 1.5rem;
            padding: 1.2rem;

        }

            color: #475569;

            }

                justify-content: flex-start;
            }
            .btn-icon {
                padding: 0.5rem 0.9rem;
            }
            .header h1 {
                font-size: 1.5rem;
            }
        }

            color: #856404;
            padding: 0.6rem;
            border-radius: 1rem;

            font-size: 0.8rem;
            text-align: center;
        }
        button:disabled {
            opacity: 0.5;
            cursor: default;

    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>📖 ଓଡ଼ିଆ ବର୍ଣ୍ଣନା ଲେଖା</h1>
        <p>କ୍ଲାସ 5-8 | 25 ଟି ବିଷୟ | ମୂଳ ଶବ୍ଦ ରେକର୍ଡିଂ | ମଡେଲ୍ ଉତ୍ତର</p>
    </div>

    <div class="topic-selector">
        <label for="topicSelect" style="font-weight:600; margin-right:0.5rem;">📌 ବିଷୟ ବାଛନ୍ତୁ : </label>
        <select id="topicSelect"></select>
    </div>

    <div class="progress-section">
        <span>🎙️ ପ୍ରଗତି : <span id="recordedCount">0</span> / <span id="totalKeywords">10</span> ଶବ୍ଦ ରେକର୍ଡ ହୋଇଛି</span>
        <span class="badge">ସମ୍ପୂର୍ଣ୍ଣ କରି "ଦେଖାଅ" ଦବାନ୍ତୁ</span>
    </div>

    <div id="keywordsContainer" class="keywords-grid">
        <!-- dynamic keyword cards -->
        <div style="text-align:center; padding:2rem;">ପ୍ରସ୍ତୁତ କରାଯାଉଛି...</div>
    </div>

    <div class="showme-section">
        <button id="showMeBtn" class="btn-show">✨ ଦେଖାଅ (Show Me) ✨</button>
        <div id="modelDisplayArea" class="model-lines" style="display: none;">
            <div class="model-title">📝 ଆମର ନମୁନା ୧୦ ଧାଡ଼ି :</div>
            <ul id="modelLinesList" class="lines-container"></ul>
        </div>
    </div>
    <div class="footer-note">🔊 ପ୍ରତ୍ୟେକ ମୂଳ ଶବ୍ଦ ପାଇଁ ରେକର୍ଡ କରନ୍ତୁ → ସମ୍ପୂର୍ଣ୍ଣ ହେଲେ 'ଦେଖାଅ' କ୍ଲିକ୍ କରନ୍ତୁ | ଅଭ୍ୟାସ ଜାରି ରଖନ୍ତୁ!</div>
</div>

<script>
    // ----------------------------- 25 TOPICS with 10 KEYWORDS & 10 MODEL LINES (ODIA) -------------------------
    // Comprehensive data for class 5-8 descriptive writing practice
    const topicsData = [
        { id:0, name:"ମୋ ବିଦ୍ୟାଳୟ", keywords:["ପାଠଶାଳା","ଶ୍ରେଣୀକୋଠରୀ","ଶିକ୍ଷକ","ପୁସ୍ତକ","ଛୁଟିବେଳ","ଝଣ୍ଡା","ପ୍ରାର୍ଥନା","ବନ୍ଧୁ","ଖେଳପଡ଼ିଆ","ସଭାଘର"], modelLines:["ମୋ ବିଦ୍ୟାଳୟର ନାଁ 'ସରସ୍ୱତୀ ଶିଶୁ ମନ୍ଦିର'।","ଏଠାରେ ବଡ଼ ଧାଡ଼ିରେ ଗଛଲଟା ଅଛି।","ପ୍ରତିଦିନ ସକାଳେ ପ୍ରାର୍ଥନା ହୁଏ।","ଆମ ଶ୍ରେଣୀକୋଠରୀ ପରିଷ୍କାର ଓ ସୁନ୍ଦର।","ଶିକ୍ଷକମାନେ ବହୁତ ସ୍ନେହ କରନ୍ତି।","ପାଠ ପଢ଼ିବା ସହିତ ଖେଳ ମଧ୍ୟ ହୁଏ।","ବାର୍ଷିକ ଉତ୍ସବରେ ସମସ୍ତେ ଭାଗ ନିଅନ୍ତି।","ପୁସ୍ତକାଳୟରେ ଅନେକ ବହି ଅଛି।","ବିଦ୍ୟାଳୟ ମୋର ଦ୍ୱିତୀୟ ଘର ସମାନ।","ମୁଁ ମୋ ବିଦ୍ୟାଳୟକୁ ବହୁତ ଭଲ ପାଏ।"] },
        { id:1, name:"ମୋ ପରିବାର", keywords:["ବାପା","ମାଆ","ଭାଇ","ଭଉଣୀ","ଜେଜେବାପା","ଜେଜେମାଆ","ଖୁସି","ଭାତ","ସାଥ","ସେବା"], modelLines:["ମୋ ପରିବାରରେ ୫ ଜଣ ସଦସ୍ୟ ଅଛନ୍ତି।","ବାପା ଜଣେ ଶିକ୍ଷକ, ସେ ବହୁତ ମେହେନ୍ତି।","ମାଆ ଗୃହିଣୀ, ସେ ଖୁବ୍ ଯତ୍ନ ନିଅନ୍ତି।","ମୋ ବଡ଼ ଭାଇ ମୋତେ ପାଠରେ ସାହାଯ୍ୟ କରେ।","ସବୁବେଳେ ରାତିରେ ଏକାଠି ଭାତ ଖାଉ।","ଜେଜେବାପା ଗପ କୁହନ୍ତି, ଖୁବ୍ ମଜା।","ଛୁଟିଦିନେ ବଗିଚାରେ ସମୟ ବିତାଉ।","ପରିବାର ମୋର ସବୁଠୁ ବଡ଼ ଧନ।","ଏମାନଙ୍କ ସ୍ନେହ ପାଇଁ ମୁଁ କୃତଜ୍ଞ।","ସମସ୍ତେ ମିଶି ରହିବା ପରିବାରର ମର୍ଯ୍ୟାଦା।"] },
        { id:2, name:"ବର୍ଷା ଋତୁ", keywords:["ବର୍ଷା","ମେଘ","ପବନ","ଚମକ","ଗର୍ଜନ","ମୟୂର","ବେଙ୍ଗ","ହରିତ","ପୋଖରୀ","ଶୀତଳ"], modelLines:["ଆଷାଢ଼ ମାସରେ ବର୍ଷା ଆସେ।","ଆକାଶରେ କଳା ମେଘ ଘୋଟିଯାଏ।","ଚମକ ଓ ଗର୍ଜନରେ ଭୂମି କମ୍ପେ।","ଝିପିଝିପି ବର୍ଷାରେ ମାଟି ସୁଗନ୍ଧ ବହେ।","ମୟୂର ପଙ୍ଖ ଖୋଲି ନାଚେ।","ବେଙ୍ଗ ରାତିସାରା ଡାକେ।","ଗଛପତ୍ର ସବୁଜ ଦେଖାଯାଏ।","ପିଲାମାନେ କାଗଜ ଡଙ୍ଗା ଭସାନ୍ତି।","ବର୍ଷା ପରେ ଇନ୍ଦ୍ରଧନୁ ଦେଖାଯାଏ।","ବର୍ଷା ଋତୁ ପ୍ରକୃତିକୁ ତରକାରୀ କରେ।"] },
        { id:3, name:"ଏକ ସୁନ୍ଦର ବଗିଚା", keywords:["ଫୁଲ","ଗୋଲାପ","ଜବା","ଗନ୍ଧ","ପ୍ରଜାପତି","ମହୁମାଛି","ସବୁଜ","ପାଣି","ସୂର୍ଯ୍ୟ","ସଜାଣି"], modelLines:["ମୋ ଘର ପଛପଟେ ଏକ ରଙ୍ଗୀନ ବଗିଚା ଅଛି।","ସେଥିରେ ଗୋଲାପ, ଜବା, ଗେଣ୍ଡୁ ଫୁଲ ଫୁଟେ।","ସକାଳେ ଫୁଲ ଉପରେ ଶିଶିର ବିନ୍ଦୁ ଦିଶେ।","ପ୍ରଜାପତି ଓ ମହୁମାଛି ଗୁଞ୍ଜରିତ ହୁଅନ୍ତି।","ବଗିଚାର ମଝିରେ ଝରଣା ତିଆରି କରାଯାଇଛି।","ସବୁଜ ଘାସ ଉପରେ ପାଦ ଦେଲେ ଅନୁଭବ ମିଳେ।","ମୁଁ ପ୍ରତିଦିନ ସନ୍ଧ୍ୟାରେ ବଗିଚାକୁ ପାଣି ଦିଏ।","ସେଠାରେ ଏକ ଦୋଳି ମଧ୍ୟ ଅଛି।","ବଗିଚା ମୋ ମନକୁ ଶାନ୍ତି ଦିଏ।","ପ୍ରକୃତିର ସୌନ୍ଦର୍ଯ୍ୟ ବଗିଚାରୁ ଜଣାଯାଏ।"] },

        { id:22, name:"ବୃକ୍ଷର ଗୁରୁତ୍ୱ", keywords:["ଗଛ","ଅମ୍ଳଜାନ","ଛାଇ","ଫଳ","ଜୀବନ","ସବୁଜ","ପରିବେଶ","ପବନ","ଜଳ","ଧରାତ୍ରୀ"], modelLines:["ଗଛ ଆମର ପ୍ରାଣବନ୍ଧୁ।","ସେ ଅମ୍ଳଜାନ ଦିଏ, କାର୍ବନ ଡାଇଅକ୍ସାଇଡ ନିଏ।","ତା' ଛାଇରେ ଆମେ ବିଶ୍ରାମ ନେଉ।","ଫଳ,ଫୁଲ,ଔଷଧ ଦିଏ।","ଗଛ ରହିଲେ ପରିବେଶ ସୁନ୍ଦର ଥାଏ।","ବୃକ୍ଷ ମାଟି ଧରିଧରେ, ବନ୍ୟା ରୋକେ।","ପବନ ଶୁଦ୍ଧ କରେ।","ଗୋଟିଏ ଗଛ ଶହେ ବର୍ଷ ବଞ୍ଚେ।","ବୃକ୍ଷ କାଟିଲେ ଜୀବନ ସଙ୍କଟ।","ଅଧିକରୁ ଅଧିକ ଗଛ ଲଗାଇବା କର୍ତ୍ତବ୍ୟ।"] },
        { id:23, name:"କମ୍ପ୍ୟୁଟର", keywords:["ଯନ୍ତ୍ର","ଅନଲାଇନ","ଜ୍ଞାନ","ଗେମ୍","ମାଉସ","କୀବୋର୍ଡ","ପଢ଼ା","ସଫ୍ଟୱେର","ଭିଡିଓ","ସ୍କ୍ରିନ"], modelLines:["କମ୍ପ୍ୟୁଟର ଏକ ଅତ୍ୟାଧୁନିକ ଯନ୍ତ୍ର।","ଏହା ଗଣନା, ଲେଖା, ପଢ଼ାରେ ସାହାଯ୍ୟ କରେ।","ଅନଲାଇନ ଶ୍ରେଣୀ ନେବାକୁ ସୁବିଧା।","ମୁଁ ଗଣିତ ସମାଧାନ ପାଇଁ ବ୍ୟବହାର କରେ।","କମ୍ପ୍ୟୁଟର ଯୋଗେ ଦୁନିଆର ଖବର ପାଏ।","ଗେମ୍ ଖେଳି ସମୟ କଟାଇ ହୁଏ।","ଅଧିକ ବ୍ୟବହାର ଆଖି ପାଇଁ କ୍ଷତିକାରକ।","ସାଇବର ସୁରକ୍ଷା ମନେ ରଖିବା ଦରକାର।","ପ୍ରୋଗ୍ରାମିଂ ଶିଖି ନୂଆ ଜିନିଷ ତିଆରି କରାଯାଏ।","କମ୍ପ୍ୟୁଟର ଭବିଷ୍ୟତର କୁଞ୍ଜି।"] },
        { id:24, name:"ପର୍ଯ୍ୟଟନ", keywords:["ଭ୍ରମଣ","ସ୍ଥାନ","ପୁରୀ","କୋଣାର୍କ","ଚିଲିକା","ମନୋରଞ୍ଜନ","ଫଟୋ","ସାଙ୍ଗ","ବସ","ଟିକେଟ"], modelLines:["ପର୍ଯ୍ୟଟନ ମନକୁ ଆନନ୍ଦ ଦିଏ।","ମୁଁ ପୁରୀ ଜଗନ୍ନାଥ ମନ୍ଦିର ଦେଖିଛି।","କୋଣାର୍କ ସୂର୍ଯ୍ୟ ମନ୍ଦିର ଶିଳ୍ପକଳା ପ୍ରସିଦ୍ଧ।","ଚିଲିକା ହ୍ରଦରେ ଡଙ୍ଗା ବିହାର କଲି।","ପର୍ଯ୍ୟଟନ ସ୍ଥାନରେ ନୂଆ ଲୋକଙ୍କ ସହ ପରିଚୟ।","ପ୍ରକୃତି ଓ ଐତିହ୍ୟ ଦେଖିବାର ସୁଯୋଗ।","ଘରୁ ବାହାରି ଆସିବାକୁ ବହୁତ ଭଲ ଲାଗେ।","ସାଙ୍ଗମାନଙ୍କ ସହ ଫଟୋ ଉଠାଇବା।","ଶୈକ୍ଷିକ ଭ୍ରମଣ ଜ୍ଞାନ ବଢ଼ାଏ।","ପର୍ଯ୍ୟଟନ ଦ୍ୱାରା ସ୍ଥାନୀୟ ସଂସ୍କୃତି ଜାଣିବା।"] }
    ];

    // ---------- GLOBALS ----------
    let mediaStream = null;
    let currentTopicIndex = 0;
    let recordings = []; // { blobUrl, recorded, recorder, chunks, isRecording } per keyword
    let activeRecorderIndex = null;
    let currentMediaRecorder = null;

    const topicSelect = document.getElementById("topicSelect");
    const keywordsContainer = document.getElementById("keywordsContainer");
    const recordedCountSpan = document.getElementById("recordedCount");
    const totalKeywordsSpan = document.getElementById("totalKeywords");
    const showMeBtn = document.getElementById("showMeBtn");
    const modelDisplayArea = document.getElementById("modelDisplayArea");
    const modelLinesList = document.getElementById("modelLinesList");

    totalKeywordsSpan.innerText = "10";

    // Request microphone permission once
    async function initMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaStream = stream;
            console.log("Microphone access granted");
            return true;
        } catch (err) {
            console.error("Microphone error:", err);
            const warnDiv = document.createElement("div");
            warnDiv.className = "permission-warning";
            warnDiv.innerText = "⚠️ ମାଇକ୍ ଆବଶ୍ୟକ! ଅନୁଗ୍ରହ କରି ପରବର୍ତ୍ତୀ ରେକର୍ଡିଂ ପାଇଁ ଅନୁମତି ଦିଅନ୍ତୁ।";
            keywordsContainer.prepend(warnDiv);
            return false;
        }
    }

    // load topic data
    function loadTopic(index) {
        const topic = topicsData[index];
        if (!topic) return;
        // clear recordings memory
        clearAllRecordingURLs();
        recordings = new Array(10).fill(null).map(() => ({ blobUrl: null, recorded: false, recorder: null, chunks: [], isRecording: false }));
        renderKeywords(topic);
        updateProgress();
        // Hide model display when topic changes
        modelDisplayArea.style.display = "none";
        // if any active recorder stop
        if (currentMediaRecorder && activeRecorderIndex !== null) {
            try { currentMediaRecorder.stop(); } catch(e) {}
            currentMediaRecorder = null;
            activeRecorderIndex = null;
        }
    }

    function clearAllRecordingURLs() {
        if (recordings) {
            recordings.forEach(rec => {
                if (rec.blobUrl) URL.revokeObjectURL(rec.blobUrl);
            });
        }
    }

    function updateProgress() {
        const completed = recordings.filter(r => r.recorded === true).length;
        recordedCountSpan.innerText = completed;
    }

    function renderKeywords(topic) {
        keywordsContainer.innerHTML = "";
        topic.keywords.forEach((kw, idx) => {
            const card = document.createElement("div");
            card.className = "keyword-card";
            const recordStatus = recordings[idx]?.recorded || false;
            card.innerHTML = `
                <div class="keyword-info">
                    <div class="keyword-number">${idx+1}</div>
                    <span class="keyword-label">${kw}</span>
                    <span class="status-dot ${recordStatus ? 'recorded' : ''}" id="statusDot_${idx}"></span>
                </div>
                <div class="audio-actions" id="actions_${idx}">
                    <button class="btn-icon btn-record" data-idx="${idx}" id="recordBtn_${idx}">🎙️ ରେକର୍ଡ</button>
                    <button class="btn-icon btn-stop" data-idx="${idx}" id="stopBtn_${idx}" style="display:${recordings[idx]?.isRecording ? 'inline-flex' : 'none'}">⏹️ ବନ୍ଦ</button>
                    <button class="btn-icon btn-play" data-idx="${idx}" id="playBtn_${idx}" ${!recordStatus ? 'disabled' : ''}>🔊 ଶୁଣ</button>
                </div>
            `;
            keywordsContainer.appendChild(card);
        });

        // attach events after render
        for (let i = 0; i < topic.keywords.length; i++) {
            const recordBtn = document.getElementById(`recordBtn_${i}`);
            const stopBtn = document.getElementById(`stopBtn_${i}`);
            const playBtn = document.getElementById(`playBtn_${i}`);
            if (recordBtn) recordBtn.addEventListener("click", () => startRecording(i));
            if (stopBtn) stopBtn.addEventListener("click", () => stopRecording(i));
            if (playBtn) playBtn.addEventListener("click", () => playRecording(i));
        }
    }

    async function startRecording(idx) {
        if (!mediaStream) {
            const ok = await initMicrophone();
            if (!ok) { alert("ମାଇକ୍ରୋଫୋନ୍ ଅନୁମତି ଦିଅନ୍ତୁ"); return; }
        }
        if (recordings[idx].isRecording) return;
        // Stop any ongoing recording on different index
        if (currentMediaRecorder && activeRecorderIndex !== null && activeRecorderIndex !== idx) {
            try { currentMediaRecorder.stop(); } catch(e) {}
            updateStopUI(activeRecorderIndex);
        }
        const chunks = [];
        const recorder = new MediaRecorder(mediaStream);
        recorder.ondataavailable = (e) => {
            if (e.data.size > 0) chunks.push(e.data);
        };
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            // revoke old url
            if (recordings[idx].blobUrl) URL.revokeObjectURL(recordings[idx].blobUrl);
            recordings[idx].blobUrl = url;
            recordings[idx].recorded = true;
            recordings[idx].chunks = [];
            recordings[idx].isRecording = false;
            updateProgress();
            // update UI
            const statusDot = document.getElementById(`statusDot_${idx}`);
            if (statusDot) statusDot.classList.add("recorded");
            const playBtn = document.getElementById(`playBtn_${idx}`);
            if (playBtn) { playBtn.disabled = false; }
            const stopBtn = document.getElementById(`stopBtn_${idx}`);
            if (stopBtn) stopBtn.style.display = "none";
            const recordBtn = document.getElementById(`recordBtn_${idx}`);
            if (recordBtn) recordBtn.style.display = "inline-flex";
            if (activeRecorderIndex === idx) activeRecorderIndex = null;
            currentMediaRecorder = null;
        };
        recorder.start();
        recordings[idx].recorder = recorder;
        recordings[idx].chunks = chunks;
        recordings[idx].isRecording = true;
        currentMediaRecorder = recorder;
        activeRecorderIndex = idx;
        // UI updates
        const stopBtn = document.getElementById(`stopBtn_${idx}`);
        if (stopBtn) stopBtn.style.display = "inline-flex";
        const recordBtn = document.getElementById(`recordBtn_${idx}`);
        if (recordBtn) recordBtn.style.display = "none";
        // add visual recording effect
        recordBtn?.classList.add("recording-active");
    }

    function stopRecording(idx) {
        if (recordings[idx].isRecording && recordings[idx].recorder && recordings[idx].recorder.state === "recording") {
            recordings[idx].recorder.stop();
        }
    }

    function updateStopUI(idx) {
        const stopBtn = document.getElementById(`stopBtn_${idx}`);
        if (stopBtn) stopBtn.style.display = "none";
        const recordBtn = document.getElementById(`recordBtn_${idx}`);
        if (recordBtn) { recordBtn.style.display = "inline-flex"; recordBtn.classList.remove("recording-active"); }
        if (recordings[idx]) recordings[idx].isRecording = false;
    }

    function playRecording(idx) {
        if (recordings[idx].recorded && recordings[idx].blobUrl) {
            const audio = new Audio(recordings[idx].blobUrl);
            audio.play().catch(e => console.warn("play err", e));
        } else {
            alert("ପ୍ରଥମେ ରେକର୍ଡ କରନ୍ତୁ!");
        }
    }

    function showModelLines() {
        const topic = topicsData[currentTopicIndex];
        if (!topic) return;
        modelLinesList.innerHTML = "";
        topic.modelLines.forEach(line => {
            const li = document.createElement("li");
            li.textContent = line;
            modelLinesList.appendChild(li);
        });
        modelDisplayArea.style.display = "block";
        // scroll smoothly
        modelDisplayArea.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    // Populate topics dropdown
    function populateTopics() {
        topicsData.forEach((topic, idx) => {
            const option = document.createElement("option");
            option.value = idx;
            option.textContent = `${idx+1}. ${topic.name}`;
            topicSelect.appendChild(option);
        });
        topicSelect.value = "0";
        currentTopicIndex = 0;
        loadTopic(0);
    }

    topicSelect.addEventListener("change", (e) => {
        const newIdx = parseInt(e.target.value);
        if (!isNaN(newIdx) && newIdx !== currentTopicIndex) {
            currentTopicIndex = newIdx;
            loadTopic(newIdx);
        }
    });

    showMeBtn.addEventListener("click", showModelLines);

    // start app
    initMicrophone().then(() => {
        populateTopics();
    }).catch(() => {
        populateTopics(); // still populate, but recording will warn
    });
</script>
</body>
</html>
